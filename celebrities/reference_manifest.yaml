# Reference Audio Manifest
# Maps each celebrity to their best YouTube/archive.org source for voice cloning.
#
# Priority order for source types:
#   1. Audiobook readings / narration (cleanest, solo voice, studio quality)
#   2. Commencement speeches / solo addresses (clean, solo, but room reverb)
#   3. Movie monologues (clean mix, but may have score underneath)
#   4. Podcast/show hosting (own show = good mic, solo segments)
#   5. Talk show interviews (last resort — crosstalk, audience noise)
#
# Requirements for a good clip:
#   - 12-15 seconds of continuous solo speech
#   - No background music, audience noise, or other speakers
#   - Clear articulation, natural pace (not whispering or shouting)
#   - Representative of their iconic vocal quality
#
# Usage:
#   python tools/batch_extract_references.py                    # extract all
#   python tools/batch_extract_references.py --celebrity morgan_freeman  # one only

celebrities:
  # Batch 1: Most distinctive voices
  morgan_freeman:
    sources:
      - url: "https://www.youtube.com/watch?v=3MAJvgm2eMg"
        title: "Morgan Freeman Narrates Pedestrians On Hollywood Boulevard"
        start: 25.0
        end: 40.0
        notes: "Solo narration, studio quality, 32dB SNR, 70% speech, iconic storytelling voice, score 68 [C]"

