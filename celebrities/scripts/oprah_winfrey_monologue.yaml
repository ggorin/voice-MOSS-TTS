celebrity: oprah_winfrey
title: "The Moment She Knew Her Calling"
slides:
  monologue:
    mode: single_pass
    text: >
      I will never forget the moment. I was nineteen years old,
      working at a little radio station in Nashville, and a woman
      called in, just crying. And she said, nobody ever listens to me.
      And something in me just... shifted. I stopped reading
      the script. I just talked to her. Like a human being.
      And when I hung up that phone, I knew. I KNEW.
      This is what I am supposed to do. Not read news.
      Not follow a teleprompter. But connect with people.
      Really see them. Because here is what I have learned:
      everybody, and I mean everybody, just wants to know
      that they matter. That somebody hears them.
      That was the moment. That one phone call changed everything.
