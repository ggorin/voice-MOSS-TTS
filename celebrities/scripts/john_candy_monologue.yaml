celebrity: john_candy
title: "The Best Meal He Ever Had Was the Simplest"
slides:
  monologue:
    mode: single_pass
    text: >
      The best meal I ever had... and I've had a lot of meals, believe me, you
      can probably tell... was a grilled cheese sandwich. That's it. A grilled
      cheese. My mom made it when I was about eight. We were at the cottage up
      north, and it was raining, and she just made this sandwich with butter and
      processed cheese on white bread. Nothing fancy. And I sat at this little
      table by the window watching the rain come down on the lake, and I bit into
      it, and I thought... this is everything. This is the whole world, right
      here. Butter, cheese, bread, rain, mom. And I've been to fancy restaurants
      since then, sure. Places with cloth napkins and guys who describe the wine
      like it's a person. But nothing ever came close. Because it's never really
      about the food, is it? It's about who's making it and why they bothered.
