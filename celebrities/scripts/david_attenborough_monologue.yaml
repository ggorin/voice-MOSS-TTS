celebrity: david_attenborough
title: "The Secret Life of Urban Foxes"
slides:
  monologue:
    mode: single_pass
    text: >
      Now, here is a creature that has learned, quite remarkably,
      to thrive in a world we built entirely for ourselves.
      The urban fox. It moves through our cities at night
      with an extraordinary confidence, picking its way along
      garden walls and through the gaps in fences as though
      it had drawn the map itself. And in a sense, it has.
      These animals know every wheelie bin, every takeaway
      discarded on a Friday evening, every cat flap left ajar.
      They have, in effect, become students of human behaviour.
      And what is most striking is this: they are not merely
      surviving in our cities. They are, by any measure,
      flourishing. One might say they have become
      the most successful tenants we never invited.
