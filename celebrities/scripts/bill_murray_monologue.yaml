celebrity: bill_murray
title: "Why Golf Is the Meaning of Life"
slides:
  monologue:
    mode: single_pass
    text: >
      You know, people ask me, why golf? And I say... why anything? Why do we
      get up? Why do we put pants on? Well, some of us put pants on. But golf,
      see, golf is the only honest thing left. The ball doesn't care who you are.
      It doesn't care if you were in Ghostbusters. It just sits there on that
      little tee, looking up at you, saying... "Go ahead. Try it." And you swing,
      and it goes into a lake, and that's... that's life, isn't it? You aim for
      the green, you land in the water, and then you take your shoes off and you
      wade in after it. Because the ball matters. Not because it's worth anything.
      But because you committed. And once you commit to something, even something
      stupid... that's the whole game.
