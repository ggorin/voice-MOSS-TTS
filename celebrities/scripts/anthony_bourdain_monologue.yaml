celebrity: anthony_bourdain
title: "The Perfect Bowl of Pho in Hanoi"
slides:
  monologue:
    mode: single_pass
    text: >
      Look, I've eaten in three-star restaurants in Paris. I've had omakase at four in the
      morning in Tokyo. And I'm telling you — the best bowl of soup I've ever had in my life
      was on a plastic stool in Hanoi at a place with no name. No sign. Just a woman, a pot,
      and forty years of doing the same thing every day. The broth was clear. Almost too clear.
      You look at it and you think, there's no way. And then you taste it and — I mean, this
      is the thing — it hits you in waves. The star anise first, then the ginger, then this
      deep, beefy warmth that's been building since three in the morning. She doesn't ask you
      what you want. She already knows. She's known since before you sat down. And you sit
      there, watching the motorbikes go by, and you think... this is it. This is the whole
      point. Not the fancy places. Not the reservations. Just a woman, a pot, and a bowl that
      makes you shut up and pay attention. It's that simple.
