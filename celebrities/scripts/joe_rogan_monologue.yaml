celebrity: joe_rogan
title: "Why Everyone Should Try Cold Plunges"
slides:
  monologue:
    mode: single_pass
    text: >
      Dude, let me tell you about cold plunges. The first time I did it,
      I thought I was gonna die. Like, legitimately. Your body is screaming
      at you, every instinct is like, get out, get OUT.
      But you stay in. And something happens around the two minute mark.
      Your brain just goes quiet. All the noise, all the nonsense,
      the emails, the drama, it just shuts off.
      And when you get out, it's like you rebooted your entire operating system.
      Everything is sharper. You feel ALIVE. Like, actually alive,
      not just going through the motions. And the science backs it up,
      the dopamine spike is insane, it's like two and a half times baseline.
      That lasts for hours. No coffee does that.
      No supplement does that. It's just you and freezing water
      and your own willpower. Everybody should try it. Everybody.
