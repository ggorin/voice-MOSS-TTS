celebrity: martin_short
title: "Why Jiminy Glick Is His Greatest Creation"
slides:
  monologue:
    mode: single_pass
    text: >
      Oh, Jiminy Glick, yes! People think I created him, but honestly, he created
      me. I was nothing before Jiminy. NOTHING! Well, that's not entirely true, I
      was on SCTV, I was in films, I had a career, but emotionally? Nothing! Jiminy
      is the character where I can say anything. Absolutely anything! I once asked
      Mel Brooks if he was still alive, to his face! And Mel laughed! Because Jiminy
      has that fat suit, and the voice, and the complete lack of awareness, and it
      gives you permission. The audience sees this oblivious, sweaty man asking the
      worst questions imaginable, and they forgive him. They forgive ME. That's the
      genius of it. You put on fifty pounds of foam rubber and suddenly you're free.
      I should wear the suit everywhere. To the grocery store. To award shows. I
      would, but Marty doesn't let me.
