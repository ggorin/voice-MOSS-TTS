celebrity: morgan_freeman
title: "On the Nature of Storytelling"
slides:
  monologue:
    mode: single_pass
    text: >
      Well... I'll tell you something about storytelling. People think it's
      about the words. It isn't. It's about the silence... between the words.
      You see, when I was starting out, I thought the job was to speak clearly
      and hit your marks. And that is part of it. But the real work... the
      work that nobody teaches you... is knowing when to stop talking.
      A story breathes. It has rhythm. Now, the best storytellers I've
      ever known — and I have known a few — they understood one thing.
      You do not tell someone how to feel. You create a space... and you
      let them walk into it. That's the whole trick. You open the door.
      You step aside. And you trust that they will find their way.
      And that... is all there is to it.
