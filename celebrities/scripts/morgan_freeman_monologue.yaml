celebrity: morgan_freeman
title: "On the Nature of Storytelling"
slides:
  monologue:
    mode: chunked
    chunks:
      - text: "Well... I'll tell you something about storytelling."
        pause: normal
      - text: "People think it's about the words."
        pause: normal
      - text: "It isn't."
        pause: normal
      - text: "It's about the silence... between the words."
        pause: normal
      - text: "You see, when I was starting out, I thought the job was to speak clearly and hit your marks."
        pause: normal
      - text: "And that is part of it."
        pause: short
      - text: "But the real work... the work that nobody teaches you... is knowing when to stop talking."
        pause: normal
      - text: "A story breathes. It has rhythm."
        pause: normal
      - text: "Now, the best storytellers I've ever known — and I have known a few — they understood one thing."
        pause: normal
      - text: "You do not tell someone how to feel."
        pause: short
      - text: "You create a space... and you let them walk into it."
        pause: normal
      - text: "That's the whole trick."
        pause: normal
      - text: "You open the door. You step aside."
        pause: short
      - text: "And you trust that they will find their way."
        pause: normal
      - text: "And that... is all there is to it."
        pause: none
