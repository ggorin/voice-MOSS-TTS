celebrity: matthew_mcconaughey
title: "Why Slowing Down Is the Fastest Way to Get Where You're Going"
slides:
  monologue:
    mode: single_pass
    text: >
      Man, I'll tell you what. I spent a good chunk of my life
      running fast. Real fast. Chasing the next thing before
      I'd even caught the last one. And here's the thing --
      I was getting somewhere, but I wasn't arriving anywhere.
      You know what I mean? There's a difference.
      And then one day I just... stopped. Pulled over.
      Not because I was tired, but because I realized
      the road I was on wasn't even mine.
      And that's when it hit me. Slowing down isn't quitting.
      Slowing down is choosing. It's saying, "Nah, I'm not gonna
      react to that. I'm gonna respond to it."
      Now, my old man, he used to say, "Son, the bull that paws
      the ground before he charges -- he's the one you watch out for."
      And that's the juice, man. The pause before the move.
      That's where the power is. Just keep livin'.
