celebrity: conan_obrien
title: "His Worst Interview and Why It Was Perfect"
slides:
  monologue:
    mode: single_pass
    text: >
      My worst interview ever was with a guy who literally would not talk. I'm
      not exaggerating. This actor, I won't say who, he sat down, and I said,
      "So, tell me about the movie," and he said, "It's good." That's it. "It's
      good." And I'm dying up there. I'm sweating through my suit. I'm throwing
      out every trick I have. I do the lean-in, I do the self-deprecating joke,
      I do the thing where I pretend his silence is hilarious. Nothing. He's just
      sitting there like a beautiful, expensive statue. And then, about four
      minutes in, I just gave up. I turned to the camera and said, "This is the
      worst interview I've ever done, and I've interviewed a horse." And the
      audience LOST it. And that's when I learned the real lesson. The best comedy
      isn't when everything works. It's when everything falls apart and you just...
      narrate the disaster. Honestly, that's my entire career philosophy.
