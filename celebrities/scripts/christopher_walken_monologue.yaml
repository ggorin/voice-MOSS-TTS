celebrity: christopher_walken
title: "Why He Dances in Every Movie He Can"
slides:
  monologue:
    mode: single_pass
    text: >
      You know, people ask me... why do you dance? Why do you always...
      put a dance in the movie? And I say, well... why WOULDN'T you?
      See, the thing is... I started out as a dancer. A dancer. Before
      I was an actor, before I was... anything, I was a kid from Queens
      who could dance. And, you know, when you're dancing... you don't
      have to explain anything. You don't have to say the right WORDS
      or hit the right... BEATS. Your body just... does it. I mean,
      every movie I do, I try to get a dance IN there somewhere. Sometimes
      they let me. Sometimes... they don't. But when they DO, you know
      what happens? People remember THAT. They don't remember the plot.
      They don't remember the dialogue. They remember the guy who...
      just started dancing. For no reason. And I think that's...
      that's a wonderful thing. Wonderful.
