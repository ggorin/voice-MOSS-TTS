celebrity: cate_blanchett
title: "Why Theatre Actors Make Better Film Actors"
slides:
  monologue:
    mode: single_pass
    text: >
      Look, I know this is going to sound like I'm being provocative, but I genuinely believe
      that theatre actors make better film actors. And I'll tell you why. In theatre, you have
      to hold an entire room — eight hundred people, some of whom would rather be at home —
      for two and a half hours with nothing but your body and your voice. No close-up is going
      to save you. No editor is going to fix the moment where you lost the audience. It's sort
      of a high-wire act without a net, every single night. And what that does — and this is
      the thing people don't understand — is it trains you to listen. Really listen. Not just
      wait for your cue, but actually hear what the other person is doing. And when you bring
      that to film, I mean, you can feel the difference. The camera knows. It's madness, really,
      that more film actors don't do it. But I suppose that's the trick, isn't it? You have to
      be willing to fail in front of a live audience. And most people... well, there you go.
