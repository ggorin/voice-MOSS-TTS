celebrity: james_earl_jones
title: "The First Time He Heard His Own Voice on Screen"
slides:
  monologue:
    mode: single_pass
    text: >
      I remember... the very first time I heard my own voice... coming from
      a screen. And I must say, I did not recognize it. I sat in that
      darkened theater and I thought... that cannot be me. That deep,
      rumbling sound... cannot belong to the boy who could not speak.
      You see, I was silent for eight years. Eight years. Not because I had
      nothing to say, but because the words... would not come. And then,
      one day, a teacher asked me to read a poem aloud. And something
      opened. Something that had been locked away. The voice you hear
      now — this instrument — it was forged in that silence. And when I
      heard it reflected back to me from that enormous screen... I understood
      something. The voice that became known for power... was born in
      powerlessness. Indeed. And I have never... forgotten that.
