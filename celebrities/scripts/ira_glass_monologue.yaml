celebrity: ira_glass
title: "How a Boring Tuesday Became the Best Story"
slides:
  monologue:
    mode: single_pass
    text: >
      So I'm sitting in the office on a Tuesday, and nothing is happening.
      Like, genuinely nothing. And I say to one of our producers,
      just go outside and talk to someone. Anyone.
      And she comes back two hours later with this tape of a guy
      who works at a parking garage. And he says this thing.
      He says, I know every car by sound.
      I can tell you who's coming before I see them.
      And from that one sentence, we got a forty minute piece
      about the invisible people who know your habits
      better than you do. Your doorman. Your barista.
      The guy at the parking garage. And I remember thinking,
      okay, this is the whole thing, right here.
      The best stories aren't the big ones.
      They're the ones that were always there,
      just waiting for someone to ask.
