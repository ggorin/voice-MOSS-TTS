celebrity: gilbert_gottfried
title: "Why He Never Used His Real Voice in Public"
slides:
  monologue:
    mode: single_pass
    text: >
      You know what? People come up to me ALL THE TIME, they say,
      Gilbert, is that your REAL voice? IS THAT YOUR REAL VOICE?
      And I say, what are you, NUTS? What am I gonna do, walk around
      talking like some guy at a LIBRARY? Like some quiet, reasonable
      PERSON? Nobody's gonna hire THAT guy! Nobody's gonna say, hey,
      get me the quiet guy, he's HILARIOUS. No! They say, get me the
      guy who sounds like he's being ELECTROCUTED. Get me the guy who
      sounds like a PARROT fell into a BLENDER. So I GAVE them that.
      Every day. For FORTY YEARS. And you know what happened? I forgot
      what the other one sounded like. I'm not even KIDDING. My wife
      would say, Gilbert, just talk normal, and I'd say, I DON'T KNOW
      WHAT THAT IS ANYMORE. ...Nice problem to have though.
