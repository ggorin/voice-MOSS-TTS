celebrity: barack_obama
title: "What He Learned from His First Campaign Loss"
slides:
  monologue:
    mode: single_pass
    text: >
      So, look. In 2000, I ran for Congress against Bobby Rush.
      And I got beat. I mean, I got beat badly. And, uh, it was humbling.
      Because I had convinced myself that I had all the right ideas,
      that the arguments would just, you know, carry the day.
      But here's what I didn't understand. Politics is not about you.
      It's about the people you're trying to serve.
      And I hadn't done the work of listening. I walked into
      barbershops and churches thinking I could explain
      what folks needed. But they already knew what they needed.
      They needed someone who would show up. Not once.
      Not during election season. But consistently.
      And, uh, that loss taught me more than any victory ever could.
      Because it taught me humility. And, let me tell you,
      that is not a lesson you forget.
