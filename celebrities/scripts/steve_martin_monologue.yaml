celebrity: steve_martin
title: "The Art of the Well-Timed Banjo Joke"
slides:
  monologue:
    mode: single_pass
    text: >
      The banjo is the funniest instrument. That's not an opinion, that's a fact.
      You can play the most beautiful melody in the world on a banjo and someone
      will laugh. It's built into the DNA of the instrument. Now, the key to a
      banjo joke is... you have to be genuinely good. If you're bad at banjo and
      you tell a joke, you're just a bad banjo player who talks too much. But if
      you're good, really good, and then you say something absurd, the audience
      doesn't know where to put it. Their brain says, "This is serious music," and
      then their ears say, "He just said something about a chicken." And that gap,
      that little moment of confusion... that's where comedy lives. Right in the
      crack between competence and nonsense. I've built my entire career in that
      crack. It's a nice crack.
