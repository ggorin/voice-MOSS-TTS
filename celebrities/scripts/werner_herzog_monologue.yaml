celebrity: werner_herzog
title: "The Ecstatic Truth of the Jungle"
slides:
  monologue:
    mode: single_pass
    text: >
      You see, the jungle is not what people imagine. It is not an
      adventure. It is not a paradise with colorful birds and gentle
      streams. No. The jungle is a place of overwhelming, suffocating
      indifference. The trees do not welcome you. The insects do not
      fear you. The river will carry your body downstream and it will
      not pause. Of course, people say to me, Werner, why do you keep
      going back? And I say, because that is where the ecstatic truth
      lives. Not in comfortable places. Not in studios. The truth is
      in the mud, in the fever, in the moment when the camera is
      failing and you are alone with something vast and indifferent.
      And that... that is the nature of filmmaking. It is not a
      profession. It is a condition.
