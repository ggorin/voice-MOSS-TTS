celebrity: jack_nicholson
title: "The Real Reason He Always Wears Sunglasses"
slides:
  monologue:
    mode: single_pass
    text: >
      Well... see, people always ask me about the sunglasses. And I used to have this whole
      routine, you know, some clever line about the glare or the paparazzi or whatever. But
      I'll tell you the real story. I was twenty-two, twenty-three years old, nobody knew who
      I was, and I bought a pair of Ray-Bans on the Venice boardwalk for... I don't know, eight
      bucks. And I put them on and I looked in the mirror and I thought, well, there he is.
      That's the guy. See, without them I was just another kid from Jersey trying to make it.
      But with them on, I was somebody. Not famous, not important — just... somebody I wanted
      to be. And I'll tell you something, I've never taken them off. Not really. Because the
      thing about a good pair of sunglasses, baby, is they don't hide you from the world. They
      let you see it the way you want to. The light's a little softer. The colors are a little
      richer. Everybody looks a little better. What are you gonna do? That's the whole game.
