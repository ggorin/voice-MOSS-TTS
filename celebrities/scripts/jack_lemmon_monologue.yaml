celebrity: jack_lemmon
title: "The Secret to Playing a Man Who's Barely Holding It Together"
slides:
  monologue:
    mode: single_pass
    text: >
      You know, people ask me, "What's the secret to playing a guy
      who's falling apart?" And I mean, look, the trick is --
      you don't play the falling apart. You play the holding together.
      That's the whole ball game. Because that's what people DO, right?
      Nobody wakes up and says, "I think I'll have a breakdown today."
      No, no, no. You get up, you put on the tie, you make the coffee,
      and you white-knuckle it through Tuesday.
      And the cracks -- I mean, the audience sees the cracks.
      You don't have to show them. Billy Wilder told me that.
      He said, "Lemmon, stop acting. The part is doing the work.
      You just have to get out of its way."
      And I thought, well, that's either genius or he's trying to fire me
      gently. But he was right. Less, Lemmon. Less.
      God, I love this business.
