celebrity: sam_elliott
title: "What the Open Road Means to a Man"
slides:
  monologue:
    mode: single_pass
    text: >
      Well... I suppose the honest answer is I don't really know what the open road means.
      Not in words, anyway. You know, there's a stretch of highway between Flagstaff and
      Sedona where the light comes through the rocks and turns everything red. And you pull
      over. And you just stand there. And that's it. That's the whole thing. I've been driving
      that road for forty years and it gets me every time. I'll tell you, there's something
      about being out there with nothing but the wind and the engine and your own thoughts.
      It settles you. It strips away all the noise — the meetings, the phone calls, all of it.
      And what you're left with is just... you. Just a man and the road and whatever he brought
      with him. I grew up around open spaces. My dad wasn't a rancher, he worked for the
      government. But we had that sky. We had that quiet. And I suppose I've been chasing
      it ever since. Not running from anything, mind you. Just driving toward something I
      can't quite name. That's the truth of it. And I wouldn't trade it for anything in
      the world.
