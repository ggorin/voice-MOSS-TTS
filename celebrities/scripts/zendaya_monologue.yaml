celebrity: zendaya
title: "Why She Almost Quit Acting at Fifteen"
slides:
  monologue:
    mode: single_pass
    text: >
      Okay so honestly, I don't think I've ever really talked about this in detail, but when
      I was like fifteen, I almost quit. Like, for real. I just remember sitting in my room
      and being like, I don't even know if this is what I want. Because the thing is, when
      you start that young, you never really choose it, you know what I mean? It just kind of
      happens and then one day you're like, wait, is this MY thing or is this just... the thing
      I do? And I literally called my mom crying, and she just goes, "Daya, if you don't want
      to do this, you don't have to." And I think hearing that — like hearing that it was
      actually my CHOICE — that changed everything. Because up until that point it felt like
      this train I couldn't get off of. And she was like, "You can get off whenever you want."
      And that was like a big thing for me. Because once I knew I could leave, I finally had a
      reason to stay. And I think that's the thing nobody tells you about doing this at a young
      age. You have to choose it. Like, really choose it. For yourself.
